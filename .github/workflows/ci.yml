name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://siyu:siyu_test_only@localhost:55432/siyu_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: siyu-ci-test-only-jwt-secret-at-least-32-characters
      SIYU_MAIL_PROVIDER: test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: siyu_test
          POSTGRES_USER: siyu
          POSTGRES_PASSWORD: siyu_test_only
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U siyu -d siyu_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack prepare pnpm@11.11.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @siyu/api prisma:generate
      - run: pnpm docs:check
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm prisma:validate
      - run: pnpm openapi:lint
      - run: pnpm openapi:generate && git diff --exit-code -- packages/shared-types/src/openapi.generated.ts
      - run: pnpm compose:check
      - run: docker compose config --quiet
      - run: pnpm --filter @siyu/api prisma:migrate:deploy
      - run: pnpm test:e2e
      - run: pnpm build
      - run: pnpm audit --audit-level moderate

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: siyu_test
          POSTGRES_USER: siyu
          POSTGRES_PASSWORD: siyu_test_only
        ports:
          - 55433:5432
        options: >-
          --health-cmd "pg_isready -U siyu -d siyu_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://siyu:siyu_test_only@localhost:55433/siyu_test?schema=public
      PGPASSWORD: siyu_test_only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack prepare pnpm@11.11.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @siyu/api prisma:migrate:deploy
      - run: docker exec -i ${{ job.services.postgres.id }} psql -U siyu -d siyu_test -v ON_ERROR_STOP=1 < scripts/test-db-constraints.sql

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
