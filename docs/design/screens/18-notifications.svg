<text x="76" y="389" font-size="15" font-weight="600" fill="#1f2329" text-anchor="start" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">攒钱目标完成</text>
<text x="76" y="414" font-size="12" font-weight="400" fill="#6f7682" text-anchor="start" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">旅行基金已达到目标金额</text>
