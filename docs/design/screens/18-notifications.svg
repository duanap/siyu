<text x="46" y="132" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">!</text>
<text x="76" y="119" font-size="15" font-weight="600" fill="#1f2329" text-anchor="start" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">情侣邀请</text>
<text x="76" y="144" font-size="12" font-weight="400" fill="#6f7682" text-anchor="start" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">李四邀请你加入情侣账本</text>
<text x="354" y="119" font-size="11" font-weight="400" fill="#8b929d" text-anchor="end" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">刚刚</text>
<rect x="16" y="180" width="358" height="86" rx="0" fill="#fff" stroke="#eef0f3" stroke-width="1"/>
<circle cx="46" cy="217" r="18" fill="#f5a623"/>
<text x="46" y="222" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">!</text>
