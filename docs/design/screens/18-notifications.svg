<text x="46" y="492" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">!</text>
<text x="76" y="479" font-size="15" font-weight="600" fill="#1f2329" text-anchor="start" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">任务生成失败</text>
<text x="76" y="504" font-size="12" font-weight="400" fill="#6f7682" text-anchor="start" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">房租账目生成失败，系统将重试</text>
<text x="354" y="479" font-size="11" font-weight="400" fill="#8b929d" text-anchor="end" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">7月5日</text>
<rect x="16" y="582" width="358" height="116" rx="14" fill="#fff" stroke="#e8ebef" stroke-width="1"/>
<text x="195" y="620" font-size="16" font-weight="600" fill="#1f2329" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">空状态 / 错误状态</text>
<text x="195" y="651" font-size="12" font-weight="400" fill="#6f7682" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">没有消息时展示简洁说明</text>
<text x="195" y="675" font-size="12" font-weight="400" fill="#6f7682" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">加载失败时提供重新加载</text>
</svg>
