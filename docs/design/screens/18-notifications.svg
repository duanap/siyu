<text x="76" y="234" font-size="12" font-weight="400" fill="#6f7682" text-anchor="start" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">本月话费需要确认实际金额</text>
<text x="354" y="209" font-size="11" font-weight="400" fill="#8b929d" text-anchor="end" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">1小时前</text>
<rect x="16" y="270" width="358" height="86" rx="0" fill="#fff" stroke="#eef0f3" stroke-width="1"/>
<circle cx="46" cy="307" r="18" fill="#e5484d"/>
<text x="46" y="312" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">!</text>
<text x="76" y="299" font-size="15" font-weight="600" fill="#1f2329" text-anchor="start" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">借贷已逾期</text>
<text x="76" y="324" font-size="12" font-weight="400" fill="#6f7682" text-anchor="start" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">欠张三的借款已逾期5天</text>
<text x="354" y="299" font-size="11" font-weight="400" fill="#8b929d" text-anchor="end" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">昨天</text>
<rect x="16" y="360" width="358" height="86" rx="0" fill="#fff" stroke="#eef0f3" stroke-width="1"/>
