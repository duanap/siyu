openapi: 3.1.0
info:
  title: SIYU API
  version: 0.1.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: |
    四时有余核心 REST API 契约。金额使用整数分且不得超过 JavaScript 安全整数；
    业务日期使用 YYYY-MM-DD，系统时间使用 UTC ISO 8601。
servers:
  - url: /api/v1
tags:
  - name: Auth
    description: 邮箱密码、QQ OAuth、令牌轮换、密码安全与注销。
  - name: Users
    description: 当前用户资料。
  - name: Ledgers
    description: 个人账本与朝暮同笺共享关系。
  - name: Categories
    description: 系统和用户分类。
  - name: Entries
    description: 普通收入与支出账目。
  - name: Debts
    description: 本人私有借贷及处理记录。
  - name: Recurring
    description: 周期规则和执行实例。
  - name: Salary
    description: 本人私有工资档案、记录和统计。
  - name: SavingGoals
    description: 个人或情侣攒钱目标。
  - name: Statistics
    description: 账本统计查询。
  - name: Notifications
    description: 本人站内通知。
  - name: Exports
    description: 有权限范围内的 CSV 导出。
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      tags: [Auth]
      operationId: registerWithEmail
      summary: 使用邮箱和密码注册
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201': { $ref: '#/components/responses/AuthTokenOk' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/login:
    post:
      tags: [Auth]
      operationId: loginWithPassword
      summary: 使用邮箱和密码登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { $ref: '#/components/responses/AuthTokenOk' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/qq/authorize:
    get:
      tags: [Auth]
      operationId: authorizeQq
      summary: 开始 QQ OAuth 登录
      security: []
      responses:
        '302':
          description: 跳转至 QQ OAuth
          headers:
            Location:
              schema: { type: string, format: uri }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/qq/callback:
    get:
      tags: [Auth]
      operationId: handleQqCallback
      summary: 处理 QQ OAuth 回调
      security: []
      parameters:
        - in: query
          name: code
          required: true
          schema: { type: string, minLength: 1 }
        - in: query
          name: state
          required: true
          schema: { type: string, minLength: 16, maxLength: 256 }
      responses:
        '302':
          description: 登录完成后跳转至手机端
          headers:
            Location:
              schema: { type: string, format: uri }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshAccessToken
      summary: 使用 HttpOnly Cookie 刷新访问令牌
      security:
        - refreshCookie: []
      responses:
        '200': { $ref: '#/components/responses/AuthTokenOk' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: 注销当前会话
      security:
        - refreshCookie: []
      responses:
        '200': { $ref: '#/components/responses/ActionOk' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/password/forgot:
    post:
      tags: [Auth]
      operationId: requestPasswordReset
      summary: 请求密码重置
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForgotPasswordRequest' }
      responses:
        '200': { $ref: '#/components/responses/ActionOk' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/password/reset:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: 使用一次性令牌重置密码
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResetPasswordRequest' }
      responses:
        '200': { $ref: '#/components/responses/ActionOk' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /auth/password/change:
    post:
      tags: [Auth]
      operationId: changePassword
      summary: 修改当前用户密码并轮换会话
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequest' }
      responses:
        '200': { $ref: '#/components/responses/AuthTokenOk' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /admin/auth/check:
    get:
      tags: [Auth]
      operationId: checkAdminAccess
      summary: 校验管理端访问权限
      responses:
        '200': { $ref: '#/components/responses/ActionOk' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /users/me:
    get:
      tags: [Users]
      operationId: getCurrentUser
      summary: 获取当前用户
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [Users]
      operationId: updateCurrentUser
      summary: 更新当前用户资料
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserRequest' }
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /ledgers:
    get:
      tags: [Ledgers]
      operationId: listLedgers
      summary: 获取可访问账本
      responses:
        '200': { $ref: '#/components/responses/ResourceListOk' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /ledgers/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Ledgers]
      operationId: getLedger
      summary: 获取账本详情
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /couple-ledgers:
    post:
      tags: [Ledgers]
      operationId: createCoupleLedger
      summary: 创建情侣账本
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCoupleLedgerRequest' }
      responses:
        '201': { $ref: '#/components/responses/ResourceCreated' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '409': { $ref: '#/components/responses/Conflict' }
  /couple-ledgers/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [Ledgers]
      operationId: updateCoupleLedger
      summary: 更新情侣账本
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCoupleLedgerRequest' }
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Ledgers]
      operationId: dissolveCoupleLedger
      summary: 解散情侣账本
      responses:
        '200': { $ref: '#/components/responses/ActionOk' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /couple-ledgers/{id}/invitations:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Ledgers]
      operationId: createCoupleInvitation
      summary: 创建有时效的情侣邀请
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCoupleInvitationRequest' }
      responses:
        '201': { $ref: '#/components/responses/InvitationCreated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
  /couple-invitations/accept:
    post:
      tags: [Ledgers]
      operationId: acceptCoupleInvitation
      summary: 接受情侣邀请
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AcceptInvitationRequest' }
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '409': { $ref: '#/components/responses/Conflict' }
  /couple-ledgers/{id}/leave:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Ledgers]
      operationId: leaveCoupleLedger
      summary: 普通成员退出情侣账本
      responses:
        '200': { $ref: '#/components/responses/ActionOk' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /couple-ledgers/{id}/transfer-ownership:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Ledgers]
      operationId: transferCoupleLedgerOwnership
      summary: 将所有权转移给另一名有效成员
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransferCoupleOwnershipRequest' }
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /categories:
    get:
      tags: [Categories]
      operationId: listCategories
      summary: 获取当前成员可见的账本分类与服务端权限能力
      parameters:
        - $ref: '#/components/parameters/LedgerId'
        - in: query
          name: type
          schema: { $ref: '#/components/schemas/EntryType' }
        - in: query
          name: includeDisabled
          schema: { type: boolean, default: false }
      responses:
        '200': { $ref: '#/components/responses/CategoryListOk' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Categories]
      operationId: createCategory
      summary: 在账本中幂等创建自定义分类
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCategoryRequest' }
      responses:
        '201': { $ref: '#/components/responses/ResourceCreated' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /categories/reorder:
    put:
      tags: [Categories]
      operationId: reorderCategories
      summary: OWNER 按账本和收支类型重排全部分类
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReorderCategoriesRequest' }
      responses:
        '200': { $ref: '#/components/responses/CategoryListOk' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /categories/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [Categories]
      operationId: updateCategory
      summary: 更新个人分类
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCategoryRequest' }
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /categories/{id}/enable:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Categories]
      operationId: enableCategory
      summary: 重新启用分类
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /categories/{id}/disable:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Categories]
      operationId: disableCategory
      summary: 停用分类并保留历史引用
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /entries:
    get:
      tags: [Entries]
      operationId: listEntries
      summary: 分页查询账目
      parameters:
        - $ref: '#/components/parameters/LedgerId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: month
          schema: { type: string, pattern: '^\d{4}-\d{2}$' }
        - in: query
          name: type
          schema: { $ref: '#/components/schemas/EntryType' }
        - in: query
          name: categoryId
          schema: { type: string, format: uuid }
        - in: query
          name: creatorUserId
          schema: { type: string, format: uuid }
        - in: query
          name: keyword
          schema: { type: string, maxLength: 100 }
      responses:
        '200': { $ref: '#/components/responses/ResourceListOk' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Entries]
      operationId: createEntry
      summary: 创建手工账目
      description: 相同用户和操作下，相同幂等键与载荷重放原结果；不同载荷返回 409。
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateEntryRequest' }
      responses:
        '201': { $ref: '#/components/responses/ResourceCreated' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
  /entries/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Entries]
      operationId: getEntry
      summary: 获取账目详情
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Entries]
      operationId: updateEntry
      summary: 更新手工账目
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateEntryRequest' }
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Entries]
      operationId: deleteEntry
      summary: 软删除账目
      responses:
        '200': { $ref: '#/components/responses/ActionOk' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /debts:
    get:
      tags: [Debts]
      operationId: listDebts
      summary: 查询本人借贷
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/ResourceListOk' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Debts]
      operationId: createDebt
      summary: 创建本人借贷
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDebtRequest' }
      responses:
        '201': { $ref: '#/components/responses/ResourceCreated' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
  /debts/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Debts]
      operationId: getDebt
      summary: 获取本人借贷详情
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Debts]
      operationId: updateDebt
      summary: 更新本人借贷
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateDebtRequest' }
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Debts]
      operationId: deleteDebt
      summary: 软删除本人借贷
      responses:
        '200': { $ref: '#/components/responses/ActionOk' }
        '404': { $ref: '#/components/responses/NotFound' }
  /debts/{id}/transactions:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Debts]
      operationId: createDebtTransaction
      summary: 记录还款或收款
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDebtTransactionRequest' }
      responses:
        '201': { $ref: '#/components/responses/ResourceCreated' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /recurring-rules:
    get:
      tags: [Recurring]
      operationId: listRecurringRules
      summary: 查询可见周期规则
      parameters:
        - $ref: '#/components/parameters/LedgerIdOptional'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/ResourceListOk' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Recurring]
      operationId: createRecurringRule
      summary: 创建周期规则
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRecurringRuleRequest' }
      responses:
        '201': { $ref: '#/components/responses/ResourceCreated' }
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /recurring-rules/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Recurring]
      operationId: getRecurringRule
      summary: 获取周期规则详情
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Recurring]
      operationId: updateRecurringRule
      summary: 更新周期规则
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateRecurringRuleRequest' }
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Recurring]
      operationId: deleteRecurringRule
      summary: 结束并软删除周期规则
      responses:
        '200': { $ref: '#/components/responses/ActionOk' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /recurring-rules/{id}/pause:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Recurring]
      operationId: pauseRecurringRule
      summary: 暂停周期规则
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '409': { $ref: '#/components/responses/Conflict' }
  /recurring-rules/{id}/resume:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Recurring]
      operationId: resumeRecurringRule
      summary: 恢复周期规则
      responses:
        '200': { $ref: '#/components/responses/ResourceOk' }
        '409': { $ref: '#/components/responses/Conflict' }
  /recurring-runs:
    get:
      tags: [Recurring]
      operationId: listRecurringRuns
      summary: 查询可见周期实例
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/RecurringRunStatus' }
      responses:
        '200': { $ref: '#/components/responses/ResourceListOk' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /recurring-runs/{id}/confirm:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Recurring]
      operationId: confirmRecurringRun
