        '200': { $ref: '#/components/responses/CsvExport' }
        '429': { $ref: '#/components/responses/RateLimited' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookie:
      type: apiKey
      in: cookie
      name: siyu_refresh_token
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    GoalId:
      in: path
      name: goalId
      required: true
      schema: { type: string, format: uuid }
    LedgerId:
      in: query
      name: ledgerId
      required: true
      schema: { type: string, format: uuid }
    LedgerIdOptional:
      in: query
      name: ledgerId
      schema: { type: string, format: uuid }
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      in: query
      name: pageSize
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Year:
      in: path
      name: year
      required: true
      schema: { type: integer, minimum: 2000, maximum: 9999 }
  responses:
    ResourceOk:
      description: 查询或更新成功
      headers:
        X-Request-ID: { $ref: '#/components/headers/RequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ResourceResponse' }
    ResourceCreated:
      description: 创建成功
      headers:
        X-Request-ID: { $ref: '#/components/headers/RequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ResourceResponse' }
    InvitationCreated:
      description: 邀请创建成功；明文凭证只在本响应中返回
      headers:
        X-Request-ID: { $ref: '#/components/headers/RequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/InvitationCreatedResponse' }
    ResourceListOk:
      description: 分页查询成功
      headers:
        X-Request-ID: { $ref: '#/components/headers/RequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ResourceListResponse' }
    CategoryListOk:
      description: 分类列表与服务端权限能力查询成功
      headers:
        X-Request-ID: { $ref: '#/components/headers/RequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/CategoryListResponse' }
    ActionOk:
      description: 操作成功
      headers:
        X-Request-ID: { $ref: '#/components/headers/RequestId' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ActionResponse' }
    AuthTokenOk:
      description: 认证成功并通过 HttpOnly Cookie 设置轮换用 Refresh Token
      headers:
        X-Request-ID: { $ref: '#/components/headers/RequestId' }
        Set-Cookie:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AuthTokenResponse' }
    StatisticsOk:
      description: 统计查询成功
      content:
        application/json:
          schema: { $ref: '#/components/schemas/StatisticsResponse' }
    CsvExport:
      description: CSV 文件
      headers:
        X-Request-ID: { $ref: '#/components/headers/RequestId' }
        Content-Disposition:
          schema: { type: string }
      content:
        text/csv:
          schema: { type: string }
    ValidationFailed:
      description: 请求参数不合法
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: 未认证或会话已失效
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: 无权执行目标操作
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: 资源不存在或按安全策略不可见
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: 幂等、唯一性、并发或业务状态冲突
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    RateLimited:
      description: 请求过于频繁
      headers:
        Retry-After:
          schema: { type: integer, minimum: 1 }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  headers:
    RequestId:
      description: 当前请求追踪标识
      schema: { type: string, minLength: 8, maxLength: 128 }
  schemas:
    Cent:
      type: integer
      format: int64
      minimum: 1
      maximum: 9007199254740991
      description: 整数分，不得超过 JavaScript 安全整数。
    NonNegativeCent:
      type: integer
      format: int64
      minimum: 0
      maximum: 9007199254740991
    BusinessDate:
      type: string
      format: date
    Timestamp:
      type: string
      format: date-time
      description: UTC ISO 8601 时间。
    IdempotencyKey:
      type: string
      minLength: 8
      maxLength: 128
      pattern: '^[A-Za-z0-9._:-]+$'
    EntryType:
      type: string
      enum: [INCOME, EXPENSE]
    CategoryIconKey:
      type: string
      enum:
        [food, shopping, transport, housing, entertainment, medical, education, gift, salary, bonus, part_time, investment, red_packet, refund, other]
    CategoryColor:
      type: string
      pattern: '^#[0-9A-Fa-f]{6}$'
    RecurringRunStatus:
      type: string
      enum: [PENDING, GENERATED, CONFIRMED, SKIPPED, FAILED]
    User:
      type: object
      required: [id, nickname, timezone, status, email, roles, permissions]
      properties:
        id: { type: string, format: uuid }
        nickname: { type: string, minLength: 1, maxLength: 100 }
        avatarUrl: { type: [string, 'null'], format: uri }
        timezone: { type: string, minLength: 1, maxLength: 64 }
        status: { type: string, enum: [ACTIVE, DISABLED] }
        email: { type: [string, 'null'], format: email }
        roles:
          type: array
          uniqueItems: true
          items: { type: string, enum: [USER, ADMIN] }
        permissions:
          type: array
          uniqueItems: true
          items: { type: string }
    Ledger:
      type: object
      required: [id, type, name, ownerUserId, status, members]
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [PERSONAL, COUPLE] }
        name: { type: string, minLength: 1, maxLength: 100 }
        ownerUserId: { type: string, format: uuid }
        status: { type: string, enum: [ACTIVE, DISSOLVED] }
        members:
          type: array
          maxItems: 2
          items: { $ref: '#/components/schemas/LedgerMember' }
    LedgerMember:
      type: object
      required: [userId, role, joinedAt, nickname]
      properties:
        userId: { type: string, format: uuid }
        role: { type: string, enum: [OWNER, MEMBER] }
        joinedAt: { $ref: '#/components/schemas/Timestamp' }
        nickname: { type: string, minLength: 1, maxLength: 100 }
        avatarUrl: { type: [string, 'null'], format: uri }
    CoupleInvitation:
      type: object
      required: [id, ledgerId, status, expiresAt]
      properties:
        id: { type: string, format: uuid }
        ledgerId: { type: string, format: uuid }
        status: { type: string, enum: [PENDING, ACCEPTED, EXPIRED, REVOKED] }
        expiresAt: { $ref: '#/components/schemas/Timestamp' }
    Category:
      type: object
      required:
        [id, ledgerId, creatorUserId, type, name, icon, color, sortOrder, isSystem, isEnabled, canEdit, canToggle, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        ledgerId: { type: string, format: uuid }
        creatorUserId: { type: [string, 'null'], format: uuid }
        type: { $ref: '#/components/schemas/EntryType' }
        name: { type: string, minLength: 1, maxLength: 50 }
        icon: { $ref: '#/components/schemas/CategoryIconKey' }
        color: { $ref: '#/components/schemas/CategoryColor' }
        sortOrder: { type: integer, minimum: 0 }
        isSystem: { type: boolean }
        isEnabled: { type: boolean }
        canEdit: { type: boolean }
        canToggle: { type: boolean }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        updatedAt: { $ref: '#/components/schemas/Timestamp' }
    Entry:
      type: object
      required: [id, ledgerId, creatorUserId, type, amountCent, categoryId, businessDate, sourceType]
      properties:
        id: { type: string, format: uuid }
        ledgerId: { type: string, format: uuid }
        creatorUserId: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/EntryType' }
        amountCent: { $ref: '#/components/schemas/Cent' }
        categoryId: { type: string, format: uuid }
        businessDate: { $ref: '#/components/schemas/BusinessDate' }
        note: { type: [string, 'null'], maxLength: 500 }
        paymentMethod: { type: [string, 'null'], maxLength: 50 }
        sourceType: { type: string, enum: [MANUAL, SALARY, DEBT_TRANSACTION, RECURRING_RUN] }
    Debt:
      type: object
      required: [id, direction, counterpartyName, principalCent, processedCent, remainingCent, startDate, status]
      properties:
        id: { type: string, format: uuid }
        direction: { type: string, enum: [BORROWED, LENT] }
        counterpartyName: { type: string, minLength: 1, maxLength: 100 }
        principalCent: { $ref: '#/components/schemas/Cent' }
        processedCent: { $ref: '#/components/schemas/NonNegativeCent' }
        remainingCent: { $ref: '#/components/schemas/NonNegativeCent' }
        startDate: { $ref: '#/components/schemas/BusinessDate' }
        dueDate: { anyOf: [{ $ref: '#/components/schemas/BusinessDate' }, { type: 'null' }] }
        status: { type: string, enum: [ACTIVE, SETTLED, OVERDUE, CANCELLED] }
    DebtTransaction:
      type: object
      required: [id, debtId, userId, amountCent, businessDate, syncEntry]
      properties:
        id: { type: string, format: uuid }
        debtId: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        amountCent: { $ref: '#/components/schemas/Cent' }
        businessDate: { $ref: '#/components/schemas/BusinessDate' }
        syncEntry: { type: boolean }
        entryId: { type: [string, 'null'], format: uuid }
        note: { type: [string, 'null'], maxLength: 500 }
    RecurringRule:
      type: object
      required: [id, ledgerId, name, entryType, amountCent, categoryId, frequency, generationMode, status]
      properties:
        id: { type: string, format: uuid }
        ledgerId: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 100 }
        entryType: { $ref: '#/components/schemas/EntryType' }
        amountCent: { $ref: '#/components/schemas/Cent' }
        categoryId: { type: string, format: uuid }
        frequency: { type: string, enum: [MONTHLY, YEARLY] }
        generationMode: { type: string, enum: [AUTO, CONFIRM] }
        status: { type: string, enum: [ACTIVE, PAUSED, COMPLETED, CANCELLED] }
    RecurringRun:
      type: object
      required: [id, ruleId, scheduledDate, amountCent, status, attempts]
      properties:
        id: { type: string, format: uuid }
        ruleId: { type: string, format: uuid }
        scheduledDate: { $ref: '#/components/schemas/BusinessDate' }
        amountCent: { $ref: '#/components/schemas/Cent' }
        status: { $ref: '#/components/schemas/RecurringRunStatus' }
        entryId: { type: [string, 'null'], format: uuid }
        attempts: { type: integer, minimum: 0 }
        lastError: { type: [string, 'null'] }
    SalaryProfile:
      type: object
      required: [id, name, payDay, defaultSyncEntry]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 100 }
        employerName: { type: [string, 'null'], maxLength: 100 }
        payDay: { type: integer, minimum: 1, maximum: 31 }
        defaultSyncEntry: { type: boolean }
    SalaryRecord:
      type: object
      required: [id, profileId, salaryMonth, grossCent, deductionCent, netCent, paymentStatus, items]
      properties:
        id: { type: string, format: uuid }
        profileId: { type: string, format: uuid }
